<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebLLM Alexa-like App (0.5B Optimized)</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #container {
            text-align: center;
            max-width: 400px;
            padding: 20px;
        }
        /* アレクサ風の光るリング */
        .alexa-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #333;
            margin: 30px auto;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .status-loading { border-color: #ff9900; animation: pulse 1.5s infinite; }
        .status-ready { border-color: #00a0e9; box-shadow: 0 0 20px #00a0e9; }
        .status-listening { border-color: #00d2ff; box-shadow: 0 0 30px #00d2ff; animation: pulse 1s infinite; }
        .status-thinking { border-color: #9b51e0; box-shadow: 0 0 25px #9b51e0; }
        .status-speaking { border-color: #27ae60; box-shadow: 0 0 25px #27ae60; }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        button {
            background-color: #00a0e9;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 160, 233, 0.4);
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.96); }
        button:disabled { background-color: #444; box-shadow: none; cursor: not-allowed; }
        #log { margin-top: 20px; font-size: 13px; color: #888; min-height: 40px; line-height: 1.4; }
        #subtitle { font-size: 18px; margin-top: 10px; font-weight: bold; color: #fff; min-height: 27px; }
    </style>
</head>
<body>

<div id="container">
    <h2>WebLLM Alexa (0.5B)</h2>
    <div id="ring" class="alexa-ring status-loading"></div>
    <p id="subtitle">モデル初期化中...</p>
    <button id="startBtn" disabled>会話をスタート</button>
    <div id="log">モデルのロード（初回のみ数百MB）を待っています...</div>
</div>

<!-- WebLLMをCDNからインポート -->
<script type="module">
    import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/+esm";

    const ring = document.getElementById("ring");
    const subtitle = document.getElementById("subtitle");
    const startBtn = document.getElementById("startBtn");
    const log = document.getElementById("log");

    // 音声アシスタントとして簡潔に日本語で答えさせる指示
// 【修正版】お手本を覚えさせて賢くするプロンプト
const SYSTEM_PROMPT = `あなたはAIアシスタントのアレクサです。短く、自然な日本語で答えてください。お手本：ユーザー: こんにちは
アシスタント: こんにちは！何かお手伝いできることはありますか？ユーザー: 元気？アシスタント: 私は元気ですよ！あなたはいかがですか？ユーザー: ありがとうアシスタント: どういたしまして！いつでも声をかけてくださいね。`;
    const MODEL_NAME = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC"; 

    // 🔥 コンテキストサイズの設定（2048 または 4096 を指定）
    const CONTEXT_SIZE = 2048; 

    let engine;
    let recognition;
    let isTalking = false;

    // 1. WebLLMの初期化と拡張チューニング
    async function initLLM() {
        try {
            if (!navigator.gpu) {
                throw new Error("WebGPUがこのブラウザでサポートされていないか、有効になっていません。");
            }

            engine = await webllm.CreateMLCEngine(MODEL_NAME, {
                initProgressCallback: (report) => {
                    log.innerText = report.text; // 進捗状況を画面に表示
                },
                // 内部処理の最適化オプション
                logLevel: "error", // デバッグ出力を抑制してオーバーヘッドを排除
                appConfig: {
                    kvCacheConfig: {
                        slidingWindowSize: CONTEXT_SIZE,  // 2048または4096に設定
                        attentionSinkSize: 4             // 長文会話でもシステムプロンプトの記憶を常時キープ
                    }
                }
            });

            // 準備完了状態のUIへ変更
            ring.className = "alexa-ring status-ready";
            subtitle.innerText = "準備完了";
            log.innerText = "ボタンを押して話しかけてください。";
            startBtn.disabled = false;

            initSpeech();
        } catch (err) {
            log.innerText = "エラー: " + err.message;
            subtitle.innerText = "起動失敗";
        }
    }

    // 2. 音声認識（耳）のセットアップ
    function initSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            log.innerText = "このブラウザはSpeechRecognitionに対応していません。(Chrome推奨)";
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = "ja-JP";
        recognition.continuous = false;   // 一言ごとに処理を区切る
        recognition.interimResults = false; // 確定した結果のみ取得

        // 聞き取りに成功したときの処理
        recognition.onresult = async (event) => {
            const userText = event.results[transcript];
            subtitle.innerText = `「${userText}」`;
            await askAI(userText); // 脳（LLM）へ送信
        };

        // 喋り終わるなどして音声認識が途切れたときの自動復帰ループ
        recognition.onend = () => {
            if (!isTalking && ring.className === "alexa-ring status-listening") {
                startListening();
            }
        };
    }

    // 3. 聞き取り状態の開始
    function startListening() {
        if (isTalking) return;
        ring.className = "alexa-ring status-listening";
        log.innerText = "話しかけてください...";
        try {
            recognition.start();
        } catch (e) {
            // 既に起動している場合の二重起動エラーを回避
        }
    }

    // 4. 脳（LLM）での返答作成
    async function askAI(inputText) {
        ring.className = "alexa-ring status-thinking";
        log.innerText = "考えています...";
        isTalking = true;

        const messages = [
            { role: "system", content: SYSTEM_PROMPT },
            { role: "user", content: inputText }
        ];

        try {
            const reply = await engine.chat.completions.create({ 
                messages,
                temperature: 0.6, // 応答の正確性と自然さのバランス
                max_tokens: 128   // 音声での聞きやすさを考慮した出力制限
            });
            
            const replyText = reply.choices.message.content;
            speak(replyText); // 口（音声合成）へ送信
        } catch (err) {
            log.innerText = "LLMエラー: " + err.message;
            isTalking = false;
            ring.className = "alexa-ring status-ready";
        }
    }

    // 5. 口（音声合成）での読み上げ
    function speak(text) {
        ring.className = "alexa-ring status-speaking";
        log.innerText = "応答中...";
        subtitle.innerText = text;

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "ja-JP";

        // 読み上げが完了したら、ハンズフリーで次の会話（聞き取り）を再開
        utterance.onend = () => {
            isTalking = false;
            startListening();
        };

        window.speechSynthesis.speak(utterance);
    }

    // 会話スタートボタン
    startBtn.addEventListener("click", () => {
        startBtn.style.display = "none";
        startListening();
    });

    // ページロード時に即座に初期化を開始
    window.addEventListener("DOMContentLoaded", initLLM);
</script>

</body>
</html>
